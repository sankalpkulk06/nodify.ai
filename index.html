  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 swap;\n  src: url(\"7ebf125b-0d8c-48cd-a3a4-9d37584b1bb8\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n\n\n<style>\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n  :root {\n    --black: #000000;\n    --white: #ffffff;\n    --gray-1: #f0f0f0;\n    --gray-2: #e0e0e0;\n    --gray-3: #b0b0b0;\n    --gray-4: #777777;\n    --gray-5: #1a1a1a;\n    --gray-6: #111111;\n  }\n\n  html { scroll-behavior: smooth; }\n\n  body {\n    background: var(--black);\n    color: var(--white);\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 16px;\n    line-height: 1.5;\n    overflow-x: hidden;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  /* ─── NAV ─── */\n  nav {\n    position: fixed;\n    top: 0; left: 0; right: 0;\n    z-index: 100;\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    padding: 24px 48px;\n    background: rgba(0,0,0,0.85);\n    backdrop-filter: blur(12px);\n    border-bottom: 1px solid rgba(255,255,255,0.06);\n  }\n\n  .nav-logo {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    text-decoration: none;\n  }\n\n  .nav-wordmark {\n    font-family: 'Space Grotesk', sans-serif;\n    font-weight: 600;\n    font-size: 18px;\n    letter-spacing: 0.05em;\n    color: var(--white);\n    text-transform: uppercase;\n  }\n\n  .nav-cta {\n    font-family: 'Space Mono', monospace;\n    font-size: 11px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--black);\n    background: var(--white);\n    border: none;\n    padding: 10px 24px;\n    cursor: pointer;\n    transition: background 0.2s, color 0.2s;\n  }\n  .nav-cta:hover { background: var(--gray-2); }\n\n  /* ─── HERO ─── */\n  .hero {\n    min-height: 100vh;\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    padding: 140px 48px 80px;\n    position: relative;\n    overflow: hidden;\n  }\n\n  .hero-bg-canvas {\n    position: fixed;\n    top: 0; left: 0;\n    width: 100vw;\n    height: 100vh;\n    pointer-events: none;\n    opacity: 0.2;\n    z-index: 0;\n  }\n\n  nav, section, footer { position: relative; z-index: 1; }\n\n  .hero-label {\n    font-family: 'Space Mono', monospace;\n    font-size: 11px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--gray-3);\n    margin-bottom: 32px;\n    opacity: 0;\n    animation: fadeUp 0.8s 0.2s forwards;\n  }\n\n  .hero-headline {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: clamp(72px, 11vw, 180px);\n    line-height: 0.92;\n    letter-spacing: -0.01em;\n    text-transform: uppercase;\n    color: var(--white);\n    max-width: 14ch;\n    opacity: 0;\n    animation: fadeUp 0.9s 0.3s forwards;\n  }\n\n  .hero-headline em {\n    font-style: normal;\n    color: var(--gray-2);\n  }\n\n  .hero-tagline {\n    margin-top: 40px;\n    font-size: clamp(16px, 1.8vw, 22px);\n    font-weight: 300;\n    color: var(--gray-2);\n    max-width: 48ch;\n    line-height: 1.55;\n    text-wrap: pretty;\n    opacity: 0;\n    animation: fadeUp 0.9s 0.5s forwards;\n  }\n\n  .hero-actions {\n    margin-top: 56px;\n    display: flex;\n    align-items: center;\n    gap: 24px;\n    flex-wrap: wrap;\n    opacity: 0;\n    animation: fadeUp 0.9s 0.65s forwards;\n  }\n\n  .btn-primary {\n    font-family: 'Space Mono', monospace;\n    font-size: 12px;\n    letter-spacing: 0.15em;\n    text-transform: uppercase;\n    color: var(--black);\n    background: var(--white);\n    border: none;\n    padding: 18px 40px;\n    cursor: pointer;\n    transition: background 0.2s, transform 0.15s;\n    white-space: nowrap;\n  }\n  .btn-primary:hover { background: var(--gray-1); transform: translateY(-1px); }\n\n  .btn-ghost {\n    font-family: 'Space Mono', monospace;\n    font-size: 12px;\n    letter-spacing: 0.15em;\n    text-transform: uppercase;\n    color: var(--gray-3);\n    background: transparent;\n    border: 1px solid var(--gray-4);\n    padding: 18px 32px;\n    cursor: pointer;\n    transition: color 0.2s, border-color 0.2s;\n    text-decoration: none;\n    display: inline-block;\n  }\n  .btn-ghost:hover { color: var(--white); border-color: var(--gray-2); }\n\n  .hero-scroll-hint {\n    position: absolute;\n    bottom: 40px;\n    left: 48px;\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    font-family: 'Space Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--gray-4);\n    opacity: 0;\n    animation: fadeUp 1s 1.2s forwards;\n  }\n  .scroll-line {\n    width: 48px;\n    height: 1px;\n    background: var(--gray-4);\n  }\n\n  /* ─── SECTION STRUCTURE ─── */\n  section {\n    padding: 120px 48px;\n    border-top: 1px solid rgba(255,255,255,0.07);\n  }\n\n  .section-label {\n    font-family: 'Space Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.25em;\n    text-transform: uppercase;\n    color: var(--gray-4);\n    margin-bottom: 64px;\n    display: flex;\n    align-items: center;\n    gap: 16px;\n  }\n  .section-label::after {\n    content: '';\n    flex: 1;\n    max-width: 80px;\n    height: 1px;\n    background: var(--gray-4);\n  }\n\n  .section-headline {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: clamp(48px, 6vw, 96px);\n    line-height: 0.95;\n    letter-spacing: 0.01em;\n    text-transform: uppercase;\n    color: var(--white);\n    margin-bottom: 48px;\n  }\n\n  /* ─── PROBLEM SECTION ─── */\n  .problem-section { background: var(--black); }\n\n  .problem-intro {\n    font-size: clamp(18px, 2vw, 26px);\n    font-weight: 300;\n    color: var(--gray-2);\n    max-width: 56ch;\n    line-height: 1.6;\n    margin-bottom: 80px;\n    text-wrap: pretty;\n  }\n\n  .problem-grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 1px;\n    background: rgba(255,255,255,0.08);\n    margin-top: 80px;\n  }\n\n  .problem-card {\n    background: var(--black);\n    padding: 48px 40px;\n    position: relative;\n  }\n\n  .problem-card-num {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: 96px;\n    line-height: 1;\n    color: rgba(255,255,255,0.04);\n    position: absolute;\n    top: 24px;\n    right: 32px;\n    pointer-events: none;\n    user-select: none;\n  }\n\n  .problem-card-role {\n    font-family: 'Space Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--gray-4);\n    margin-bottom: 20px;\n  }\n\n  .problem-card-title {\n    font-family: 'Space Grotesk', sans-serif;\n    font-weight: 600;\n    font-size: 20px;\n    color: var(--white);\n    margin-bottom: 16px;\n    line-height: 1.3;\n  }\n\n  .problem-card-body {\n    font-size: 14px;\n    font-weight: 300;\n    color: var(--gray-3);\n    line-height: 1.7;\n  }\n\n  .problem-card-barrier {\n    margin-top: 32px;\n    padding-top: 24px;\n    border-top: 1px solid rgba(255,255,255,0.07);\n    font-family: 'Space Mono', monospace;\n    font-size: 11px;\n    color: var(--gray-2);\n    display: flex;\n    align-items: flex-start;\n    gap: 10px;\n    line-height: 1.5;\n  }\n  .problem-card-barrier::before {\n    content: '→';\n    flex-shrink: 0;\n    margin-top: 1px;\n  }\n\n  .problem-footer {\n    margin-top: 80px;\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: clamp(32px, 4vw, 64px);\n    line-height: 1;\n    color: var(--gray-4);\n    text-transform: uppercase;\n    letter-spacing: 0.02em;\n  }\n  .problem-footer span { color: var(--white); }\n\n  /* ─── HOW IT WORKS ─── */\n  .how-section { background: var(--gray-6); }\n\n  .steps-container {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 0;\n    margin-top: 80px;\n    position: relative;\n  }\n\n  .steps-container::before {\n    content: '';\n    position: absolute;\n    top: 32px;\n    left: 32px;\n    right: calc(25% - 32px);\n    height: 1px;\n    background: rgba(255,255,255,0.12);\n    pointer-events: none;\n  }\n\n  .step {\n    padding: 0 32px 48px 0;\n    position: relative;\n  }\n\n  .step-num-wrap {\n    display: flex;\n    flex-direction: column;\n    align-items: flex-start;\n    gap: 12px;\n    margin-bottom: 40px;\n  }\n\n  .step-node {\n    width: 64px;\n    height: 64px;\n    border: 1px solid rgba(255,255,255,0.2);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    flex-shrink: 0;\n    position: relative;\n    background: var(--black);\n  }\n\n  .step-node-inner {\n    width: 10px;\n    height: 10px;\n    background: var(--white);\n    border-radius: 50%;\n  }\n\n  .step-num {\n    font-family: 'Space Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.15em;\n    color: var(--gray-4);\n  }\n\n  .step-verb {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: 48px;\n    line-height: 1;\n    color: var(--white);\n    margin-bottom: 16px;\n    text-transform: uppercase;\n  }\n\n  .step-body {\n    font-size: 14px;\n    font-weight: 300;\n    color: var(--gray-3);\n    line-height: 1.7;\n    max-width: 22ch;\n  }\n\n  .step-detail {\n    margin-top: 24px;\n    font-family: 'Space Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--gray-4);\n    padding-top: 20px;\n    border-top: 1px solid rgba(255,255,255,0.06);\n  }\n\n  /* ─── COMPARISON ─── */\n  .comparison-section { background: var(--black); }\n\n  .comparison-intro {\n    font-size: clamp(18px, 2vw, 24px);\n    font-weight: 300;\n    color: var(--gray-2);\n    max-width: 52ch;\n    line-height: 1.6;\n    margin-bottom: 80px;\n    text-wrap: pretty;\n  }\n\n  .comparison-table {\n    width: 100%;\n    border-collapse: collapse;\n    font-size: 14px;\n  }\n\n  .comparison-table th {\n    font-family: 'Space Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--gray-4);\n    text-align: left;\n    padding: 16px 24px;\n    border-bottom: 1px solid rgba(255,255,255,0.12);\n    font-weight: 400;\n  }\n\n  .comparison-table th.nodify-col {\n    color: var(--white);\n    border-bottom: 2px solid var(--white);\n  }\n\n  .comparison-table td {\n    padding: 20px 24px;\n    border-bottom: 1px solid rgba(255,255,255,0.05);\n    color: var(--gray-2);\n    vertical-align: top;\n    line-height: 1.5;\n    font-weight: 300;\n  }\n\n  .comparison-table td:first-child {\n    color: var(--gray-2);\n    font-weight: 500;\n    font-size: 13px;\n  }\n\n  .comparison-table td.nodify-col {\n    color: var(--white);\n    font-weight: 400;\n    background: rgba(255,255,255,0.02);\n  }\n\n  .check { color: var(--white); font-weight: 600; }\n  .cross { color: var(--gray-3); }\n\n  .tag {\n    display: inline-block;\n    font-family: 'Space Mono', monospace;\n    font-size: 9px;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    border: 1px solid rgba(255,255,255,0.15);\n    padding: 3px 8px;\n    color: var(--gray-3);\n    margin-left: 8px;\n    vertical-align: middle;\n  }\n\n  /* ─── NODE GRAPH VISUAL ─── */\n  .graph-visual-section {\n    background: var(--gray-6);\n    padding: 120px 48px;\n    border-top: 1px solid rgba(255,255,255,0.07);\n    text-align: center;\n    overflow: hidden;\n    position: relative;\n  }\n\n  .graph-canvas-wrap {\n    max-width: 800px;\n    margin: 80px auto 0;\n    position: relative;\n  }\n\n  /* ─── WAITLIST / CTA ─── */\n  .cta-section {\n    background: var(--black);\n    padding: 160px 48px;\n    text-align: center;\n    position: relative;\n    overflow: hidden;\n  }\n\n  .cta-bg-node {\n    position: absolute;\n    inset: 0;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    opacity: 0.04;\n    pointer-events: none;\n  }\n\n  .cta-eyebrow {\n    font-family: 'Space Mono', monospace;\n    font-size: 11px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--gray-4);\n    margin-bottom: 32px;\n  }\n\n  .cta-headline {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: clamp(56px, 8vw, 128px);\n    line-height: 0.9;\n    text-transform: uppercase;\n    color: var(--white);\n    margin-bottom: 48px;\n    position: relative;\n  }\n\n  .cta-sub {\n    font-size: clamp(16px, 1.5vw, 20px);\n    font-weight: 300;\n    color: var(--gray-3);\n    max-width: 44ch;\n    margin: 0 auto 64px;\n    line-height: 1.6;\n    text-wrap: pretty;\n  }\n\n  .waitlist-form {\n    display: flex;\n    max-width: 480px;\n    margin: 0 auto;\n    gap: 0;\n  }\n\n  .waitlist-input {\n    flex: 1;\n    background: var(--gray-6);\n    border: 1px solid rgba(255,255,255,0.12);\n    border-right: none;\n    color: var(--white);\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 14px;\n    padding: 18px 24px;\n    outline: none;\n    transition: border-color 0.2s;\n  }\n  .waitlist-input::placeholder { color: var(--gray-4); }\n  .waitlist-input:focus { border-color: rgba(255,255,255,0.3); }\n\n  .waitlist-submit {\n    font-family: 'Space Mono', monospace;\n    font-size: 11px;\n    letter-spacing: 0.15em;\n    text-transform: uppercase;\n    color: var(--black);\n    background: var(--white);\n    border: 1px solid var(--white);\n    padding: 18px 28px;\n    cursor: pointer;\n    transition: background 0.2s;\n    white-space: nowrap;\n  }\n  .waitlist-submit:hover { background: var(--gray-1); }\n\n  .cta-footnote {\n    margin-top: 24px;\n    font-family: 'Space Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--gray-5);\n  }\n\n  /* ─── FOOTER ─── */\n  footer {\n    border-top: 1px solid rgba(255,255,255,0.07);\n    padding: 40px 48px;\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n  }\n\n  .footer-logo {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n  }\n\n  .footer-copy {\n    font-family: 'Space Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.1em;\n    color: var(--gray-4);\n    text-transform: uppercase;\n  }\n\n  /* ─── ANIMATIONS ─── */\n  @keyframes fadeUp {\n    from { opacity: 0; transform: translateY(20px); }\n    to { opacity: 1; transform: translateY(0); }\n  }\n\n  @keyframes nodePulse {\n    0%, 100% { opacity: 1; r: 5; }\n    50% { opacity: 0.4; r: 7; }\n  }\n\n  @keyframes dashFlow {\n    to { stroke-dashoffset: -40; }\n  }\n\n  .flow-edge {\n    stroke-dasharray: 6 6;\n    animation: dashFlow 2s linear infinite;\n  }\n\n  /* Scroll-triggered reveals — elegant, smooth */\n  .reveal {\n    opacity: 0;\n    transform: translate3d(0, 28px, 0);\n    filter: blur(4px);\n    transition:\n      opacity 1.1s cubic-bezier(0.22, 1, 0.36, 1),\n      transform 1.1s cubic-bezier(0.22, 1, 0.36, 1),\n      filter 1.1s cubic-bezier(0.22, 1, 0.36, 1);\n    will-change: opacity, transform, filter;\n  }\n  .reveal.visible {\n    opacity: 1;\n    transform: translate3d(0, 0, 0);\n    filter: blur(0);\n  }\n\n  /* Subtle stagger for grid children when the container reveals */\n  .reveal.stagger > * {\n    opacity: 0;\n    transform: translate3d(0, 24px, 0);\n    transition:\n      opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1),\n      transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);\n  }\n  .reveal.stagger.visible > * {\n    opacity: 1;\n    transform: translate3d(0, 0, 0);\n  }\n  .reveal.stagger.visible > *:nth-child(1) { transition-delay: 0.05s; }\n  .reveal.stagger.visible > *:nth-child(2) { transition-delay: 0.18s; }\n  .reveal.stagger.visible > *:nth-child(3) { transition-delay: 0.31s; }\n  .reveal.stagger.visible > *:nth-child(4) { transition-delay: 0.44s; }\n\n  /* Gentle parallax drift on sections as they enter */\n  @media (prefers-reduced-motion: no-preference) {\n    section {\n      transform: translate3d(0, 0, 0);\n      transition: transform 0.2s linear;\n    }\n  }\n\n  @media (prefers-reduced-motion: reduce) {\n    .reveal, .reveal.stagger > * {\n      transition: none !important;\n      opacity: 1 !important;\n      transform: none !important;\n      filter: none !important;\n    }\n  }\n\n  /* ─── RESPONSIVE ─── */\n  @media (max-width: 900px) {\n    nav { padding: 20px 24px; }\n    .hero { padding: 120px 24px 60px; }\n    section { padding: 80px 24px; }\n    .problem-grid { grid-template-columns: 1fr; }\n    .steps-container { grid-template-columns: repeat(2, 1fr); gap: 48px; }\n    .steps-container::before { display: none; }\n    footer { flex-direction: column; gap: 16px; text-align: center; }\n    .waitlist-form { flex-direction: column; }\n    .waitlist-input { border-right: 1px solid rgba(255,255,255,0.12); border-bottom: none; }\n  }\n\n  @media (max-width: 600px) {\n    .steps-container { grid-template-columns: 1fr; }\n    .hero { padding: 100px 20px 60px; }\n    section { padding: 64px 20px; }\n    nav { padding: 16px 20px; }\n    .hero-actions { gap: 16px; }\n  }\n\n  /* ─── FOUNDERS ─── */\n  .founders-section { background: var(--gray-6); }\n\n  .founders-grid {\n    display: grid;\n    grid-template-columns: repeat(2, 1fr);\n    gap: 1px;\n    background: rgba(255,255,255,0.08);\n    margin-top: 80px;\n  }\n\n  .founder-card {\n    background: var(--gray-6);\n    padding: 56px 48px;\n    display: flex;\n    gap: 36px;\n    align-items: flex-start;\n  }\n\n  .founder-avatar {\n    flex-shrink: 0;\n  }\n\n  .founder-avatar-placeholder {\n    width: 96px;\n    height: 96px;\n    border: 1px solid rgba(255,255,255,0.12);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    background: var(--black);\n    overflow: hidden;\n  }\n\n  .founder-photo {\n    width: 100%;\n    height: 100%;\n    object-fit: cover;\n    display: block;\n    filter: grayscale(0) contrast(1);\n  }\n\n  .founder-name {\n    font-family: 'Space Grotesk', sans-serif;\n    font-weight: 600;\n    font-size: 22px;\n    color: var(--white);\n    margin-bottom: 6px;\n  }\n\n  .founder-title {\n    font-family: 'Space Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--gray-3);\n    margin-bottom: 20px;\n  }\n\n  .founder-bio {\n    font-size: 14px;\n    font-weight: 300;\n    color: var(--gray-3);\n    line-height: 1.75;\n    max-width: 38ch;\n    text-wrap: pretty;\n    margin: 0 0 24px;\n    padding-left: 18px;\n    list-style: none;\n  }\n  .founder-bio li {\n    position: relative;\n    padding-left: 0;\n    margin-bottom: 10px;\n  }\n  .founder-bio li::before {\n    content: '—';\n    position: absolute;\n    left: -18px;\n    color: var(--gray-4);\n  }\n\n  .founder-links {\n    display: flex;\n    gap: 20px;\n  }\n\n  .founder-link {\n    font-family: 'Space Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.15em;\n    text-transform: uppercase;\n    color: var(--gray-4);\n    text-decoration: none;\n    transition: color 0.2s;\n  }\n  .founder-link:hover { color: var(--white); }\n\n  @media (max-width: 900px) {\n    .founders-grid { grid-template-columns: 1fr; }\n    .founder-card { flex-direction: column; padding: 40px 24px; }\n  }\n\n  /* Tweaks panel */\n  #tweaks-panel {\n    display: none;\n    position: fixed;\n    bottom: 24px; right: 24px;\n    background: #111;\n    border: 1px solid rgba(255,255,255,0.15);\n    padding: 24px;\n    z-index: 9999;\n    min-width: 260px;\n    font-family: 'Space Grotesk', sans-serif;\n  }\n  #tweaks-panel.visible { display: block; }\n  .tweaks-title {\n    font-family: 'Space Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--gray-3);\n    margin-bottom: 20px;\n  }\n  .tweak-row {\n    margin-bottom: 16px;\n  }\n  .tweak-label {\n    font-size: 11px;\n    color: var(--gray-3);\n    margin-bottom: 8px;\n    display: block;\n    font-family: 'Space Mono', monospace;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n  }\n  .tweak-select, .tweak-range {\n    width: 100%;\n    background: #000;\n    border: 1px solid rgba(255,255,255,0.12);\n    color: var(--white);\n    padding: 8px 12px;\n    font-family: 'Space Grotesk', sans-serif;\n    font-size: 13px;\n    outline: none;\n  }\n  .tweak-range { padding: 4px 0; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- NAV -->\n<nav>\n  <a class=\"nav-logo\" href=\"#\">\n    <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n      <circle cx=\"5\" cy=\"23\" r=\"3.5\" fill=\"white\"><\u002Fcircle>\n      <circle cx=\"5\" cy=\"5\" r=\"3.5\" fill=\"white\"><\u002Fcircle>\n      <circle cx=\"23\" cy=\"23\" r=\"3.5\" fill=\"white\"><\u002Fcircle>\n      <circle cx=\"23\" cy=\"5\" r=\"3.5\" fill=\"white\"><\u002Fcircle>\n      <line x1=\"5\" y1=\"23\" x2=\"5\" y2=\"5\" stroke=\"white\" stroke-width=\"1.5\"><\u002Fline>\n      <line x1=\"5\" y1=\"5\" x2=\"23\" y2=\"23\" stroke=\"white\" stroke-width=\"1.5\"><\u002Fline>\n      <line x1=\"23\" y1=\"23\" x2=\"23\" y2=\"5\" stroke=\"white\" stroke-width=\"1.5\"><\u002Fline>\n    <\u002Fsvg>\n    <span class=\"nav-wordmark\">Nodify<\u002Fspan>\n  <\u002Fa>\n  <button class=\"nav-cta\" onclick=\"document.getElementById('waitlist').scrollIntoView({behavior:'smooth'})\">Join Waitlist<\u002Fbutton>\n<\u002Fnav>\n\n<!-- GLOBAL NODE BACKGROUND -->\n<svg id=\"heroBg\" xmlns=\"http://www.w3.org/2000/svg\" style=\"position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;opacity:0.3;z-index:0;\"><\u002Fsvg>\n\n<!-- HERO -->\n<section class=\"hero\" style=\"border-top: none;\">\n  <div class=\"hero-label\">Nodify AI &nbsp;·&nbsp; Private Beta 2026<\u002Fdiv>\n\n  <h1 class=\"hero-headline\">\n    The GUI<br>for the<br><em>Agentic<\u002Fem><br>Era.\n  <\u002Fh1>\n\n  <p class=\"hero-tagline\">\n    The visual way to build AI agents. No code. No frameworks. Just describe what you want.\n  <\u002Fp>\n\n  <div class=\"hero-actions\">\n    <button class=\"btn-primary\" onclick=\"document.getElementById('waitlist').scrollIntoView({behavior:'smooth'})\">\n      Request Access\n    <\u002Fbutton>\n    <a class=\"btn-ghost\" href=\"#how-it-works\">See How It Works<\u002Fa>\n  <\u002Fdiv>\n\n  <div class=\"hero-scroll-hint\">\n    <span class=\"scroll-line\"><\u002Fspan>\n    <span>Scroll to explore<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROBLEM -->\n<section class=\"problem-section\" id=\"problem\">\n  <div class=\"section-label\">01 — The Problem<\u002Fdiv>\n\n  <h2 class=\"section-headline reveal\">Most people<br>can't build agents.<\u002Fh2>\n\n  <p class=\"problem-intro reveal\">\n    The tools exist. The capability is real. But the GUI does not. A technical gap this wide doesn't slow adoption — it stops it entirely.\n  <\u002Fp>\n\n  <div class=\"problem-grid reveal\">\n    <div class=\"problem-card\">\n      <div class=\"problem-card-num\">01<\u002Fdiv>\n      <div class=\"problem-card-role\">Marketing Manager<\u002Fdiv>\n      <div class=\"problem-card-title\">Research competitors.<br>Draft reports. Automatically.<\u002Fdiv>\n      <div class=\"problem-card-body\">She knows exactly what she wants. She has the use case. She has the business value. She cannot build it herself.<\u002Fdiv>\n      <div class=\"problem-card-barrier\">Has to hire an engineer — for a workflow a 5-minute Nodify session would generate.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"problem-card\">\n      <div class=\"problem-card-num\">02<\u002Fdiv>\n      <div class=\"problem-card-role\">Startup Founder<\u002Fdiv>\n      <div class=\"problem-card-title\">Qualify leads. Send follow-ups. Update the CRM.<\u002Fdiv>\n      <div class=\"problem-card-body\">A complete agentic sales loop. Entirely within his reach conceptually. Entirely out of reach technically.<\u002Fdiv>\n      <div class=\"problem-card-barrier\">LangFlow requires templates and setup. Claude Code cannot one-shot a full workflow. There is no middle ground.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"problem-card\">\n      <div class=\"problem-card-num\">03<\u002Fdiv>\n      <div class=\"problem-card-role\">Hospital Ops Team<\u002Fdiv>\n      <div class=\"problem-card-title\">Route patient inquiries. Flag urgent cases.<\u002Fdiv>\n      <div class=\"problem-card-body\">High stakes. Real need. A team of operators with deep domain knowledge and zero ability to build the agent that would save them hours every day.<\u002Fdiv>\n      <div class=\"problem-card-barrier\">Completely locked out. Not for lack of vision — for lack of a GUI.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"problem-footer reveal\">\n    The tools exist.<br>\n    <span>The GUI does not.<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HOW IT WORKS -->\n<section class=\"how-section\" id=\"how-it-works\">\n  <div class=\"section-label\">02 — How It Works<\u002Fdiv>\n  <h2 class=\"section-headline reveal\">Four steps.<br>Production-ready.<\u002Fh2>\n\n  <div class=\"steps-container\">\n    <div class=\"step reveal\">\n      <div class=\"step-num-wrap\">\n        <div class=\"step-node\"><div class=\"step-node-inner\"><\u002Fdiv><\u002Fdiv>\n        <span class=\"step-num\">Step 01<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"step-verb\">Describe<\u002Fdiv>\n      <div class=\"step-body\">Tell Nodify what you want in plain English. Your goal, your workflow, your outcome. No syntax, no framework, no prior knowledge required.<\u002Fdiv>\n      <div class=\"step-detail\">Natural language input<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"step reveal\" style=\"transition-delay: 0.1s\">\n      <div class=\"step-num-wrap\">\n        <div class=\"step-node\"><div class=\"step-node-inner\"><\u002Fdiv><\u002Fdiv>\n        <span class=\"step-num\">Step 02<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"step-verb\">Iterate<\u002Fdiv>\n      <div class=\"step-body\">Nodify proposes a visual node graph of your workflow. Inspect each node. Adjust conversationally. See your logic rendered as a live, interactive diagram.<\u002Fdiv>\n      <div class=\"step-detail\">Visual node editor<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"step reveal\" style=\"transition-delay: 0.2s\">\n      <div class=\"step-num-wrap\">\n        <div class=\"step-node\"><div class=\"step-node-inner\"><\u002Fdiv><\u002Fdiv>\n        <span class=\"step-num\">Step 03<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"step-verb\">Confirm<\u002Fdiv>\n      <div class=\"step-body\">Nodify infers the tools, APIs, MCP connections, and permissions your workflow needs — then presents them for your review before anything runs.<\u002Fdiv>\n      <div class=\"step-detail\">Permission review<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"step reveal\" style=\"transition-delay: 0.3s\">\n      <div class=\"step-num-wrap\">\n        <div class=\"step-node\"><div class=\"step-node-inner\"><\u002Fdiv><\u002Fdiv>\n        <span class=\"step-num\">Step 04<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"step-verb\">Generate<\u002Fdiv>\n      <div class=\"step-body\">A complete, production-ready agentic application — deployed and running in minutes. Not a prototype. Not a demo. Something that actually works.<\u002Fdiv>\n      <div class=\"step-detail\">Production deploy<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Mini node graph visual -->\n  <div class=\"graph-canvas-wrap reveal\" style=\"transition-delay:0.2s\">\n    <svg width=\"100%\" viewBox=\"0 0 800 200\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" style=\"overflow:visible\">\n      <!-- Edges (static) -->\n      <line x1=\"100\" y1=\"100\" x2=\"300\" y2=\"100\" stroke=\"rgba(255,255,255,0.15)\" stroke-width=\"1\"><\u002Fline>\n      <line x1=\"300\" y1=\"100\" x2=\"300\" y2=\"70\" stroke=\"rgba(255,255,255,0.12)\" stroke-width=\"1\"><\u002Fline>\n      <line x1=\"300\" y1=\"100\" x2=\"300\" y2=\"130\" stroke=\"rgba(255,255,255,0.12)\" stroke-width=\"1\"><\u002Fline>\n      <line x1=\"300\" y1=\"70\" x2=\"450\" y2=\"70\" stroke=\"rgba(255,255,255,0.12)\" stroke-width=\"1\"><\u002Fline>\n      <line x1=\"300\" y1=\"130\" x2=\"450\" y2=\"130\" stroke=\"rgba(255,255,255,0.12)\" stroke-width=\"1\"><\u002Fline>\n      <line x1=\"450\" y1=\"70\" x2=\"500\" y2=\"85\" stroke=\"rgba(255,255,255,0.12)\" stroke-width=\"1\"><\u002Fline>\n      <line x1=\"450\" y1=\"130\" x2=\"500\" y2=\"115\" stroke=\"rgba(255,255,255,0.12)\" stroke-width=\"1\"><\u002Fline>\n      <line x1=\"500\" y1=\"100\" x2=\"700\" y2=\"100\" stroke=\"rgba(255,255,255,0.15)\" stroke-width=\"1\"><\u002Fline>\n      <!-- Flow edges animated -->\n      <line x1=\"100\" y1=\"100\" x2=\"300\" y2=\"100\" stroke=\"white\" stroke-width=\"1\" stroke-dasharray=\"6 10\" class=\"flow-edge\"><\u002Fline>\n      <line x1=\"300\" y1=\"100\" x2=\"300\" y2=\"70\" stroke=\"white\" stroke-width=\"1\" stroke-dasharray=\"4 8\" class=\"flow-edge\" style=\"animation-delay:-0.5s;opacity:0.6\"><\u002Fline>\n      <line x1=\"300\" y1=\"100\" x2=\"300\" y2=\"130\" stroke=\"white\" stroke-width=\"1\" stroke-dasharray=\"4 8\" class=\"flow-edge\" style=\"animation-delay:-0.7s;opacity:0.6\"><\u002Fline>\n      <line x1=\"300\" y1=\"70\" x2=\"450\" y2=\"70\" stroke=\"white\" stroke-width=\"1\" stroke-dasharray=\"4 8\" class=\"flow-edge\" style=\"animation-delay:-1s;opacity:0.5\"><\u002Fline>\n      <line x1=\"450\" y1=\"70\" x2=\"500\" y2=\"85\" stroke=\"white\" stroke-width=\"1\" stroke-dasharray=\"4 8\" class=\"flow-edge\" style=\"animation-delay:-1.4s;opacity:0.5\"><\u002Fline>\n      <line x1=\"500\" y1=\"100\" x2=\"700\" y2=\"100\" stroke=\"white\" stroke-width=\"1\" stroke-dasharray=\"6 10\" class=\"flow-edge\" style=\"animation-delay:-2s\"><\u002Fline>\n      <!-- Nodes -->\n      <circle cx=\"100\" cy=\"100\" r=\"8\" fill=\"black\" stroke=\"rgba(255,255,255,0.4)\" stroke-width=\"1.5\"><\u002Fcircle>\n      <circle cx=\"100\" cy=\"100\" r=\"3\" fill=\"white\" style=\"animation: nodePulse 2.5s ease-in-out infinite;\"><\u002Fcircle>\n      <circle cx=\"300\" cy=\"100\" r=\"12\" fill=\"black\" stroke=\"white\" stroke-width=\"1.5\"><\u002Fcircle>\n      <circle cx=\"300\" cy=\"100\" r=\"5\" fill=\"white\"><\u002Fcircle>\n      <circle cx=\"300\" cy=\"70\" r=\"6\" fill=\"black\" stroke=\"rgba(255,255,255,0.4)\" stroke-width=\"1\"><\u002Fcircle>\n      <circle cx=\"300\" cy=\"70\" r=\"2.5\" fill=\"rgba(255,255,255,0.6)\"><\u002Fcircle>\n      <circle cx=\"300\" cy=\"130\" r=\"6\" fill=\"black\" stroke=\"rgba(255,255,255,0.4)\" stroke-width=\"1\"><\u002Fcircle>\n      <circle cx=\"300\" cy=\"130\" r=\"2.5\" fill=\"rgba(255,255,255,0.6)\"><\u002Fcircle>\n      <circle cx=\"450\" cy=\"70\" r=\"6\" fill=\"black\" stroke=\"rgba(255,255,255,0.3)\" stroke-width=\"1\"><\u002Fcircle>\n      <circle cx=\"450\" cy=\"70\" r=\"2.5\" fill=\"rgba(255,255,255,0.5)\"><\u002Fcircle>\n      <circle cx=\"450\" cy=\"130\" r=\"6\" fill=\"black\" stroke=\"rgba(255,255,255,0.3)\" stroke-width=\"1\"><\u002Fcircle>\n      <circle cx=\"450\" cy=\"130\" r=\"2.5\" fill=\"rgba(255,255,255,0.5)\"><\u002Fcircle>\n      <circle cx=\"500\" cy=\"100\" r=\"10\" fill=\"black\" stroke=\"white\" stroke-width=\"1.5\"><\u002Fcircle>\n      <circle cx=\"500\" cy=\"100\" r=\"4\" fill=\"white\"><\u002Fcircle>\n      <circle cx=\"700\" cy=\"100\" r=\"12\" fill=\"white\"><\u002Fcircle>\n      <circle cx=\"700\" cy=\"100\" r=\"5\" fill=\"black\"><\u002Fcircle>\n      <!-- Labels -->\n      <text x=\"100\" y=\"124\" text-anchor=\"middle\" fill=\"rgba(255,255,255,0.4)\" font-family=\"Space Mono, monospace\" font-size=\"9\" letter-spacing=\"1\">DESCRIBE<\u002Ftext>\n      <text x=\"300\" y=\"84\" text-anchor=\"middle\" fill=\"rgba(255,255,255,0.6)\" font-family=\"Space Mono, monospace\" font-size=\"9\" letter-spacing=\"1\">ITERATE<\u002Ftext>\n      <text x=\"500\" y=\"124\" text-anchor=\"middle\" fill=\"rgba(255,255,255,0.5)\" font-family=\"Space Mono, monospace\" font-size=\"9\" letter-spacing=\"1\">CONFIRM<\u002Ftext>\n      <text x=\"700\" y=\"126\" text-anchor=\"middle\" fill=\"rgba(255,255,255,0.6)\" font-family=\"Space Mono, monospace\" font-size=\"9\" letter-spacing=\"1\">GENERATE<\u002Ftext>\n    <\u002Fsvg>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHY NODIFY -->\n<section class=\"comparison-section\" id=\"why-nodify\">\n  <div class=\"section-label\">03 — Why Nodify<\u002Fdiv>\n  <h2 class=\"section-headline reveal\">Everything else<br>falls short.<\u002Fh2>\n\n  <p class=\"comparison-intro reveal\">\n    Visual builders are template-driven. AI code generators can't one-shot a complete workflow. Chat interfaces are paralyzing when you don't know exactly what to ask. The GUI was missing. Until now.\n  <\u002Fp>\n\n  <table class=\"comparison-table reveal\">\n    <thead>\n      <tr>\n        <th>Capability<\u002Fth>\n        <th>LangFlow <span class=\"tag\">Visual<\u002Fspan><\u002Fth>\n        <th>Cursor / Claude Code <span class=\"tag\">AI Code<\u002Fspan><\u002Fth>\n        <th>n8n / Zapier <span class=\"tag\">Automation<\u002Fspan><\u002Fth>\n        <th class=\"nodify-col\">Nodify AI<\u002Fth>\n      <\u002Ftr>\n    <\u002Fthead>\n    <tbody>\n      <tr>\n        <td>No code required<\u002Ftd>\n        <td><span class=\"cross\">Partial<\u002Fspan><\u002Ftd>\n        <td><span class=\"cross\">No<\u002Fspan><\u002Ftd>\n        <td><span class=\"cross\">Partial<\u002Fspan><\u002Ftd>\n        <td class=\"nodify-col\"><span class=\"check\">Yes<\u002Fspan><\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td>Natural language input<\u002Ftd>\n        <td><span class=\"cross\">No<\u002Fspan><\u002Ftd>\n        <td><span class=\"cross\">Chat only<\u002Fspan><\u002Ftd>\n        <td><span class=\"cross\">No<\u002Fspan><\u002Ftd>\n        <td class=\"nodify-col\"><span class=\"check\">Yes — primary interface<\u002Fspan><\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td>Visual node graph<\u002Ftd>\n        <td><span class=\"cross\">Template-driven<\u002Fspan><\u002Ftd>\n        <td><span class=\"cross\">No<\u002Fspan><\u002Ftd>\n        <td><span class=\"cross\">Fixed nodes only<\u002Fspan><\u002Ftd>\n        <td class=\"nodify-col\"><span class=\"check\">Generated, editable<\u002Fspan><\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td>Production-ready output<\u002Ftd>\n        <td><span class=\"cross\">Manual setup<\u002Fspan><\u002Ftd>\n        <td><span class=\"cross\">Incomplete<\u002Fspan><\u002Ftd>\n        <td><span class=\"cross\">Low complexity only<\u002Fspan><\u002Ftd>\n        <td class=\"nodify-col\"><span class=\"check\">Full deploy in minutes<\u002Fspan><\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td>Multi-agent orchestration<\u002Ftd>\n        <td><span class=\"cross\">No<\u002Fspan><\u002Ftd>\n        <td><span class=\"cross\">No<\u002Fspan><\u002Ftd>\n        <td><span class=\"cross\">No<\u002Fspan><\u002Ftd>\n        <td class=\"nodify-col\"><span class=\"check\">Yes — birds-eye view<\u002Fspan><\u002Ftd>\n      <\u002Ftr>\n      <tr>\n        <td>Explore without knowing what to ask<\u002Ftd>\n        <td><span class=\"cross\">No<\u002Fspan><\u002Ftd>\n        <td><span class=\"cross\">No<\u002Fspan><\u002Ftd>\n        <td><span class=\"cross\">No<\u002Fspan><\u002Ftd>\n        <td class=\"nodify-col\"><span class=\"check\">Visual proposals<\u002Fspan><\u002Ftd>\n      <\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n<\u002Fsection>\n\n<!-- FOUNDERS -->\n<section class=\"founders-section\" id=\"founders\">\n  <div class=\"section-label\">04 — The Founders<\u002Fdiv>\n  <h2 class=\"section-headline reveal\">Built by people<br>who've felt the gap.<\u002Fh2>\n\n  <div class=\"founders-grid reveal\">\n    <div class=\"founder-card\">\n      <div class=\"founder-avatar\">\n        <div class=\"founder-avatar-placeholder\">\n          <img class=\"founder-photo\" src=\"2c3bf7c3-545c-4afe-93b7-0eb82d9974f6\" alt=\"Rohan\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"founder-info\">\n        <div class=\"founder-name\">Rohan Bennur<\u002Fdiv>\n        <div class=\"founder-title\">Co-Founder<\u002Fdiv>\n        <ul class=\"founder-bio\">\n          <li>Built production-grade infrastructure at Amagi (NBCU, DAZN scale)<\u002Fli>\n          <li>Deep experience in distributed systems and reliability<\u002Fli>\n        <\u002Ful>\n        <div class=\"founder-links\">\n          <a href=\"https://www.linkedin.com/in/rohan-bennur/\" target=\"_blank\" rel=\"noopener\" class=\"founder-link\">LinkedIn →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"founder-card\">\n      <div class=\"founder-avatar\">\n        <div class=\"founder-avatar-placeholder\">\n          <img class=\"founder-photo\" src=\"30c22260-6ddb-4475-99d0-699fe9def723\" alt=\"Sankalp\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"founder-info\">\n        <div class=\"founder-name\">Sankalp Kulkarni<\u002Fdiv>\n        <div class=\"founder-title\">Co-Founder<\u002Fdiv>\n        <ul class=\"founder-bio\">\n          <li>Built autonomous systems, from Physical AI to LLM-based agents<\u002Fli>\n          <li>Experience turning high-level intent into real-world execution<\u002Fli>\n        <\u002Ful>\n        <div class=\"founder-links\">\n          <a href=\"https://www.linkedin.com/in/sankalpkulkarni/\" target=\"_blank\" rel=\"noopener\" class=\"founder-link\">LinkedIn →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CTA -->\n<section class=\"cta-section\" id=\"waitlist\">\n  <div class=\"cta-bg-node\">\n    <svg width=\"600\" height=\"600\" viewBox=\"0 0 600 600\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n      <circle cx=\"100\" cy=\"500\" r=\"20\" fill=\"white\"><\u002Fcircle>\n      <circle cx=\"100\" cy=\"100\" r=\"20\" fill=\"white\"><\u002Fcircle>\n      <circle cx=\"500\" cy=\"500\" r=\"20\" fill=\"white\"><\u002Fcircle>\n      <circle cx=\"500\" cy=\"100\" r=\"20\" fill=\"white\"><\u002Fcircle>\n      <line x1=\"100\" y1=\"500\" x2=\"100\" y2=\"100\" stroke=\"white\" stroke-width=\"3\"><\u002Fline>\n      <line x1=\"100\" y1=\"100\" x2=\"500\" y2=\"500\" stroke=\"white\" stroke-width=\"3\"><\u002Fline>\n      <line x1=\"500\" y1=\"500\" x2=\"500\" y2=\"100\" stroke=\"white\" stroke-width=\"3\"><\u002Fline>\n    <\u002Fsvg>\n  <\u002Fdiv>\n\n  <div class=\"cta-eyebrow\">Early Access<\u002Fdiv>\n\n  <h2 class=\"cta-headline reveal\">\n    Build your<br>first agent<br>today.\n  <\u002Fh2>\n\n  <p class=\"cta-sub reveal\">\n    Nodify AI is in private beta. Join the waitlist and be first to build production-ready agentic workflows — without writing a single line of code.\n  <\u002Fp>\n\n  <div class=\"waitlist-form reveal\">\n    <input class=\"waitlist-input\" type=\"email\" placeholder=\"your@email.com\" id=\"emailInput\">\n    <button class=\"waitlist-submit\" onclick=\"handleWaitlist()\">Request Access<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"cta-footnote\" id=\"waitlist-confirm\" style=\"opacity:0; transition: opacity 0.4s;\">— You're on the list. We'll be in touch. —<\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <div class=\"footer-logo\">\n    <svg width=\"22\" height=\"22\" viewBox=\"0 0 28 28\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n      <circle cx=\"5\" cy=\"23\" r=\"3\" fill=\"rgba(255,255,255,0.4)\"><\u002Fcircle>\n      <circle cx=\"5\" cy=\"5\" r=\"3\" fill=\"rgba(255,255,255,0.4)\"><\u002Fcircle>\n      <circle cx=\"23\" cy=\"23\" r=\"3\" fill=\"rgba(255,255,255,0.4)\"><\u002Fcircle>\n      <circle cx=\"23\" cy=\"5\" r=\"3\" fill=\"rgba(255,255,255,0.4)\"><\u002Fcircle>\n      <line x1=\"5\" y1=\"23\" x2=\"5\" y2=\"5\" stroke=\"rgba(255,255,255,0.3)\" stroke-width=\"1.5\"><\u002Fline>\n      <line x1=\"5\" y1=\"5\" x2=\"23\" y2=\"23\" stroke=\"rgba(255,255,255,0.3)\" stroke-width=\"1.5\"><\u002Fline>\n      <line x1=\"23\" y1=\"23\" x2=\"23\" y2=\"5\" stroke=\"rgba(255,255,255,0.3)\" stroke-width=\"1.5\"><\u002Fline>\n    <\u002Fsvg>\n    <span class=\"footer-copy\">Nodify AI © 2025<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"footer-copy\">The GUI for the Agentic Era<\u002Fdiv>\n<\u002Ffooter>\n\n<!-- TWEAKS -->\n<div id=\"tweaks-panel\">\n  <div class=\"tweaks-title\">Tweaks<\u002Fdiv>\n  <div class=\"tweak-row\">\n    <label class=\"tweak-label\">Hero Headline Size<\u002Flabel>\n    <input class=\"tweak-range\" type=\"range\" min=\"60\" max=\"200\" value=\"180\" id=\"tweak-headline-size\" oninput=\"document.querySelector('.hero-headline').style.fontSize = this.value + 'px'\">\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <label class=\"tweak-label\">Surface Shade<\u002Flabel>\n    <select class=\"tweak-select\" id=\"tweak-bg\" onchange=\"applyBgTweak(this.value)\">\n      <option value=\"black\">Pure Black<\u002Foption>\n      <option value=\"#0a0a0a\">Near Black<\u002Foption>\n      <option value=\"#111\">Dark Charcoal<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <label class=\"tweak-label\">Body Font<\u002Flabel>\n    <select class=\"tweak-select\" onchange=\"document.body.style.fontFamily = this.value\">\n      <option value=\"'Space Grotesk', sans-serif\">Space Grotesk<\u002Foption>\n      <option value=\"'Space Mono', monospace\">Space Mono<\u002Foption>\n      <option value=\"'Georgia', serif\">Georgia<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // Hero background — animated node graph\n  (function() {\n    const svg = document.getElementById('heroBg');\n    const W = window.innerWidth, H = window.innerHeight;\n    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);\n\n    const nodes = [];\n    const count = 18;\n    for (let i = 0; i < count; i++) {\n      nodes.push({\n        x: Math.random() * W,\n        y: Math.random() * H,\n        vx: (Math.random() - 0.5) * 0.3,\n        vy: (Math.random() - 0.5) * 0.3,\n      });\n    }\n\n    const edgesEl = [];\n    const dotsEl = [];\n\n    // Create edges between nearby nodes\n    for (let i = 0; i < count; i++) {\n      for (let j = i + 1; j < count; j++) {\n        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');\n        line.setAttribute('stroke', 'white');\n        line.setAttribute('stroke-width', '1');\n        svg.appendChild(line);\n        edgesEl.push({ el: line, a: i, b: j });\n      }\n    }\n\n    // Create dots\n    for (let i = 0; i < count; i++) {\n      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');\n      c.setAttribute('r', '2.5');\n      c.setAttribute('fill', 'white');\n      svg.appendChild(c);\n      dotsEl.push(c);\n    }\n\n    function tick() {\n      for (let i = 0; i < count; i++) {\n        nodes[i].x += nodes[i].vx;\n        nodes[i].y += nodes[i].vy;\n        if (nodes[i].x < 0 || nodes[i].x > W) nodes[i].vx *= -1;\n        if (nodes[i].y < 0 || nodes[i].y > H) nodes[i].vy *= -1;\n        dotsEl[i].setAttribute('cx', nodes[i].x);\n        dotsEl[i].setAttribute('cy', nodes[i].y);\n      }\n      for (const e of edgesEl) {\n        const a = nodes[e.a], b = nodes[e.b];\n        const dist = Math.hypot(a.x - b.x, a.y - b.y);\n        const maxDist = 220;\n        if (dist < maxDist) {\n          const op = (1 - dist / maxDist) * 0.6;\n          e.el.setAttribute('stroke-opacity', op);\n          e.el.setAttribute('x1', a.x); e.el.setAttribute('y1', a.y);\n          e.el.setAttribute('x2', b.x); e.el.setAttribute('y2', b.y);\n        } else {\n          e.el.setAttribute('stroke-opacity', '0');\n        }\n      }\n      requestAnimationFrame(tick);\n    }\n    tick();\n  })();\n\n  // Scroll reveal — adds a stagger class to children-based reveals\n  document.querySelectorAll('.problem-grid, .founders-grid, .steps-container').forEach(el => {\n    el.classList.add('reveal', 'stagger');\n  });\n\n  const reveals = document.querySelectorAll('.reveal');\n  const observer = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        e.target.classList.add('visible');\n        observer.unobserve(e.target);\n      }\n    });\n  }, { threshold: 0.15, rootMargin: '0px 0px -8% 0px' });\n  reveals.forEach(el => observer.observe(el));\n\n  // Elegant scroll-driven effects — hero fade + subtle section lift\n  const hero = document.querySelector('.hero');\n  const heroBg = document.getElementById('heroBg');\n  const heroHeadline = document.querySelector('.hero-headline');\n  const heroTagline = document.querySelector('.hero-tagline');\n  const heroActions = document.querySelector('.hero-actions');\n  const heroLabel = document.querySelector('.hero-label');\n\n  let lastY = -1;\n  let ticking = false;\n  function onScroll() {\n    const y = window.scrollY;\n    if (y === lastY) { ticking = false; return; }\n    lastY = y;\n\n    // Skip at the very top so the hero's initial fade-up animation plays cleanly\n    if (y < 2) {\n      ticking = false;\n      return;\n    }\n\n    // Hero: gentle parallax + fade as user scrolls past\n    const vh = window.innerHeight;\n    const progress = Math.min(1, y / vh);\n    if (heroHeadline) {\n      heroHeadline.style.transform = `translate3d(0, ${y * 0.18}px, 0)`;\n      heroHeadline.style.opacity = String(1 - progress * 0.9);\n    }\n    if (heroTagline) {\n      heroTagline.style.transform = `translate3d(0, ${y * 0.10}px, 0)`;\n      heroTagline.style.opacity = String(1 - progress * 1.1);\n    }\n    if (heroActions) {\n      heroActions.style.transform = `translate3d(0, ${y * 0.06}px, 0)`;\n      heroActions.style.opacity = String(1 - progress * 1.2);\n    }\n    if (heroLabel) {\n      heroLabel.style.opacity = String(1 - progress * 1.3);\n    }\n    if (heroBg) {\n      heroBg.style.transform = `translate3d(0, ${y * 0.25}px, 0)`;\n    }\n\n    ticking = false;\n  }\n  window.addEventListener('scroll', () => {\n    if (!ticking) {\n      requestAnimationFrame(onScroll);\n      ticking = true;\n    }\n  }, { passive: true });\n\n  // Waitlist\n  function handleWaitlist() {\n    const email = document.getElementById('emailInput').value;\n    if (!email || !email.includes('@')) {\n      document.getElementById('emailInput').style.borderColor = 'rgba(255,255,255,0.5)';\n      return;\n    }\n    document.getElementById('emailInput').style.display = 'none';\n    document.querySelector('.waitlist-submit').style.display = 'none';\n    const confirm = document.getElementById('waitlist-confirm');\n    confirm.style.opacity = '1';\n  }\n\n  // Tweaks\n  window.addEventListener('message', (e) => {\n    if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('visible');\n    if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');\n  });\n  window.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\n  function applyBgTweak(val) {\n    document.querySelector('.hero').style.background = val;\n    document.querySelector('.problem-section').style.background = val;\n    document.querySelector('.comparison-section').style.background = val;\n    document.querySelector('.cta-section').style.background = val;\n  }\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

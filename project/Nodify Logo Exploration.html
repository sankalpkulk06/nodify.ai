<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nodify AI — Logo Exploration</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0eee9; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

const FONT = "'Space Grotesk', sans-serif";
const INK  = '#0c0c0c';
const MID  = '#888';
const LITE = '#e8e8e8';

// ─── Icon A: Hub ──────────────────────────────────────────────────────────────
// Central filled node + 5 outer spoke nodes. Pentagon geometry.
// Evokes: AI orchestrating multiple agents.
function HubIcon({ size, color = INK }) {
  const c = size / 2;
  const outerR = size * 0.365;
  const spokeR = size * 0.078;
  const coreR  = size * 0.13;
  const sw = Math.max(1, size * 0.038);
  const pts = Array.from({ length: 5 }, (_, i) => {
    const a = (i * 72 - 90) * (Math.PI / 180);
    return { x: c + outerR * Math.cos(a), y: c + outerR * Math.sin(a) };
  });
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none">
      {pts.map((p, i) => (
        <line key={i} x1={c} y1={c} x2={p.x} y2={p.y}
          stroke={color} strokeWidth={sw} strokeLinecap="round" />
      ))}
      {pts.map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r={spokeR} fill={color} />
      ))}
      <circle cx={c} cy={c} r={coreR} fill={color} />
    </svg>
  );
}

// ─── Icon B: N-Mark ───────────────────────────────────────────────────────────
// The letter N deconstructed into 4 nodes + 3 edges.
// TL→BL (left stroke), TL→BR (diagonal), TR→BR (right stroke).
// Evokes: lettermark + graph = product identity.
function NMarkIcon({ size, color = INK }) {
  const pad  = size * 0.155;
  const nodeR = size * 0.092;
  const sw   = Math.max(1, size * 0.042);
  const tl = { x: pad,        y: pad };
  const bl = { x: pad,        y: size - pad };
  const tr = { x: size - pad, y: pad };
  const br = { x: size - pad, y: size - pad };
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none">
      <line x1={tl.x} y1={tl.y} x2={bl.x} y2={bl.y} stroke={color} strokeWidth={sw} strokeLinecap="round" />
      <line x1={tl.x} y1={tl.y} x2={br.x} y2={br.y} stroke={color} strokeWidth={sw} strokeLinecap="round" />
      <line x1={tr.x} y1={tr.y} x2={br.x} y2={br.y} stroke={color} strokeWidth={sw} strokeLinecap="round" />
      {[tl, bl, tr, br].map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r={nodeR} fill={color} />
      ))}
    </svg>
  );
}

// ─── Icon C: Mesh ─────────────────────────────────────────────────────────────
// Equilateral triangle of 3 outer nodes + 1 elevated center node, fully connected.
// Evokes: dense graph, interconnected intelligence.
function MeshIcon({ size, color = INK }) {
  const c = size / 2;
  const outerR = size * 0.385;
  const nodeR  = size * 0.075;
  const coreR  = size * 0.1;
  const sw = Math.max(1, size * 0.036);
  // Triangle: top + bottom-left + bottom-right
  const pts = [
    { x: c,                        y: c - outerR },
    { x: c - outerR * Math.sin(Math.PI * 2/3) * (-1), y: c + outerR * 0.5 },
    { x: c + outerR * Math.sin(Math.PI * 2/3),        y: c + outerR * 0.5 },
  ];
  // Center sits at centroid shifted slightly up
  const center = { x: c, y: c + outerR * 0.1 };
  const edges = [
    [pts[0], pts[1]], [pts[1], pts[2]], [pts[2], pts[0]],
    [pts[0], center], [pts[1], center], [pts[2], center],
  ];
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none">
      {edges.map(([a, b], i) => (
        <line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y}
          stroke={color} strokeWidth={sw} strokeLinecap="round" />
      ))}
      {pts.map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r={nodeR} fill={color} />
      ))}
      <circle cx={center.x} cy={center.y} r={coreR} fill={color} />
    </svg>
  );
}

// ─── Icon D: Arc / Flow ───────────────────────────────────────────────────────
// 4 nodes on a gentle arc, connected in sequence + one skip connection.
// Evokes: multi-step workflow, directed graph, pipeline with intelligence.
function ArcIcon({ size, color = INK }) {
  const sw = Math.max(1, size * 0.04);
  // 4 nodes on a gentle downward arc
  const nodes = [
    { x: size * 0.10, y: size * 0.50 },
    { x: size * 0.37, y: size * 0.34 },
    { x: size * 0.63, y: size * 0.34 },
    { x: size * 0.90, y: size * 0.50 },
  ];
  // Radii: outer two smaller, inner two larger (importance hierarchy)
  const radii = [size * 0.072, size * 0.095, size * 0.095, size * 0.072];
  // Sequential edges + 1 skip: 0→1, 1→2, 2→3, plus 0→3 as a long arc
  const seq = [[0,1],[1,2],[2,3]];

  // SVG arc path for the long skip connection: quadratic curve
  const n0 = nodes[0], n3 = nodes[3];
  const arcPath = `M ${n0.x} ${n0.y} Q ${size/2} ${size * 0.88} ${n3.x} ${n3.y}`;

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none">
      {/* skip arc */}
      <path d={arcPath} stroke={color} strokeWidth={sw * 0.72}
        strokeLinecap="round" strokeDasharray={`${sw*1.5} ${sw*2.2}`} fill="none" opacity="0.45" />
      {/* sequential lines */}
      {seq.map(([a, b], i) => (
        <line key={i}
          x1={nodes[a].x} y1={nodes[a].y}
          x2={nodes[b].x} y2={nodes[b].y}
          stroke={color} strokeWidth={sw} strokeLinecap="round" />
      ))}
      {nodes.map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r={radii[i]} fill={color} />
      ))}
    </svg>
  );
}

// ─── Logo Card ────────────────────────────────────────────────────────────────
function LogoCard({ IconComp, dirLabel, tagline }) {
  return (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', flexDirection: 'column',
      background: '#fff',
      fontFamily: FONT,
    }}>

      {/* ── Hero zone ── */}
      <div style={{
        flex: 1,
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        justifyContent: 'center',
        gap: 28,
        padding: '36px 48px 24px',
      }}>
        {/* Symbol large */}
        <IconComp size={80} />

        {/* Horizontal lockup */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 13 }}>
          <IconComp size={28} />
          <span style={{
            fontFamily: FONT,
            fontSize: 26,
            fontWeight: 500,
            letterSpacing: '-0.5px',
            color: INK,
            lineHeight: 1,
          }}>Nodify</span>
        </div>
      </div>

      {/* ── Bottom strip ── */}
      <div style={{
        borderTop: `1px solid #f0f0f0`,
        padding: '14px 20px',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
      }}>
        {/* Small scale previews */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          {[20, 14].map(s => (
            <div key={s} style={{
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              width: s + 6, height: s + 6,
            }}>
              <IconComp size={s} />
            </div>
          ))}
          {/* Dark app icon */}
          <div style={{
            width: 32, height: 32,
            background: INK,
            borderRadius: 7,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <IconComp size={20} color="#fff" />
          </div>
        </div>

        {/* Direction label */}
        <div style={{ textAlign: 'right' }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: MID, letterSpacing: '0.06em', textTransform: 'uppercase' }}>
            {dirLabel}
          </div>
          <div style={{ fontSize: 11, color: '#bbb', marginTop: 1 }}>
            {tagline}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="logos"
        title="Nodify AI — Logo Exploration"
        subtitle="4 directions · Black & White · Geometric · Space Grotesk"
      >
        <DCArtboard id="hub" label="A · Hub" width={420} height={300}>
          <LogoCard IconComp={HubIcon} dirLabel="Hub" tagline="Central orchestration" />
        </DCArtboard>
        <DCArtboard id="nmark" label="B · N-Mark" width={420} height={300}>
          <LogoCard IconComp={NMarkIcon} dirLabel="N-Mark" tagline="Letter as graph" />
        </DCArtboard>
        <DCArtboard id="mesh" label="C · Mesh" width={420} height={300}>
          <LogoCard IconComp={MeshIcon} dirLabel="Mesh" tagline="Fully connected" />
        </DCArtboard>
        <DCArtboard id="arc" label="D · Arc" width={420} height={300}>
          <LogoCard IconComp={ArcIcon} dirLabel="Arc" tagline="Directed flow" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
